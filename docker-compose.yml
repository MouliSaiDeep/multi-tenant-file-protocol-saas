services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_PATH=/app/db/prod.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - ./db:/app/db
    depends_on:
      db:
        condition: service_healthy
      sftp_server:
        condition: service_healthy
      ftp_server:
        condition: service_healthy
      smb_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db:
    image: nouchka/sqlite3:latest
    stdin_open: true
    tty: true
    volumes:
      - ./db:/var/lib/sqlite
    healthcheck:
      test: ["CMD", "sqlite3", "/var/lib/sqlite/prod.db", "SELECT 1;"]
      interval: 10s
      timeout: 5s
      retries: 5

  sftp_server:
    image: atmoz/sftp:latest
    volumes:
      - ./test-servers/sftp/users.conf:/etc/sftp/users.conf:ro
      - ./test-servers/sftp/data:/home/testuser/upload
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep sshd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ftp_server:
    image: fauria/vsftpd:latest
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      - FTP_USER=testuser
      - FTP_PASS=pass123
      - PASV_ADDRESS=127.0.0.1
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep [v]sftpd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  smb_server:
    image: dperson/samba:latest
    ports:
      - "1139:139"
      - "1445:445"
    command: -u "testuser;pass123" -s "public;/share;yes;no;yes;all"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep smbd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
